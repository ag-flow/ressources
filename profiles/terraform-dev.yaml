name: Terraform / IaC
description: Terraform & HCL — language server HashiCorp, format auto, validation
image: mcr.microsoft.com/devcontainers/base:ubuntu
extensions:
  - hashicorp.terraform
  - hashicorp.hcl
settings:
  editor.formatOnSave: true
  "[terraform]":
    editor.defaultFormatter: hashicorp.terraform
  "[terraform-vars]":
    editor.defaultFormatter: hashicorp.terraform
  terraform.languageServer.enable: true
