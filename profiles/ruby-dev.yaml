name: Ruby Dev
description: Ruby — Ruby LSP (Shopify), débogueur rdbg, format auto
image: mcr.microsoft.com/devcontainers/ruby:3.3
extensions:
  - Shopify.ruby-lsp
  - KoichiSasada.vscode-rdbg
settings:
  editor.formatOnSave: true
  "[ruby]":
    editor.defaultFormatter: Shopify.ruby-lsp
  rubyLsp.formatter: auto
  rubyLsp.enabledFeatures:
    - documentHighlights
    - documentSymbols
    - foldingRanges
    - selectionRanges
    - semanticHighlighting
    - formatting
    - diagnostics
    - codeActions
